<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sanskriti Gurukulam School | Morar Gwalior | Happy Jain</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #fefcf5;
      color: #1e2a1f;
      line-height: 1.5;
      scroll-behavior: smooth;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 28px;
    }

    /* header & navigation */
    header {
      background: rgba(255, 255, 245, 0.96);
      backdrop-filter: blur(6px);
      box-shadow: 0 2px 12px rgba(60, 45, 20, 0.05);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #e7e2d4;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      gap: 1.5rem;
    }

    .logo h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #2b5e2f, #4a7c3f);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .logo .tag {
      font-size: 0.75rem;
      font-weight: 500;
      color: #6b4e2e;
      letter-spacing: 0.5px;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .nav-links a {
      text-decoration: none;
      font-weight: 500;
      color: #3a5c2e;
      transition: 0.2s;
      font-size: 1rem;
      border-bottom: 2px solid transparent;
      padding-bottom: 4px;
    }

    .nav-links a:hover {
      color: #2b7a3e;
      border-bottom-color: #4c9f5e;
    }

    /* hero section */
    .hero {
      background: linear-gradient(105deg, #f1f7ec 0%, #ffffff 92%);
      border-radius: 2rem;
      margin: 2rem 0 2rem;
      padding: 2.8rem 2.2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.02);
      border: 1px solid #e2e0d0;
    }

    .hero-content h2 {
      font-size: 2.8rem;
      font-weight: 800;
      color: #1b4123;
      letter-spacing: -0.5px;
    }

    .school-badge {
      background: #e4efdd;
      display: inline-block;
      padding: 0.3rem 1.2rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.85rem;
      color: #2b6e3c;
      margin: 0.75rem 0 1rem 0;
    }

    .contact-card-hero {
      margin-top: 1.4rem;
      background: white;
      border-radius: 1.5rem;
      padding: 1.2rem 1.8rem;
      display: inline-flex;
      flex-direction: column;
      gap: 0.8rem;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.04);
      border: 1px solid #e6e2d4;
      width: 100%;
      max-width: 380px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1rem;
    }

    .contact-item strong {
      font-weight: 600;
      min-width: 70px;
      color: #3a6232;
    }

    .contact-item a {
      color: #2a8447;
      text-decoration: none;
      font-weight: 500;
    }

    .contact-item a:hover {
      text-decoration: underline;
    }

    .hero-avatar {
      background: #e5f0db;
      border-radius: 50%;
      width: 150px;
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4.2rem;
      box-shadow: 0 12px 18px rgba(0, 0, 0, 0.04);
    }

    /* page sections */
    .page-section {
      background: white;
      border-radius: 2rem;
      padding: 2.2rem 2rem;
      margin: 2rem 0;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.02);
      border: 1px solid #ece7dc;
    }

    .section-title {
      font-size: 1.9rem;
      font-weight: 700;
      color: #1e492c;
      margin-bottom: 1.5rem;
      border-left: 6px solid #3c9e5c;
      padding-left: 1rem;
    }

    .policy-content h3, .terms-content h3 {
      margin-top: 1.6rem;
      margin-bottom: 0.5rem;
      font-weight: 600;
      font-size: 1.25rem;
      color: #2a6e3a;
    }

    .policy-content p, .terms-content p {
      margin-bottom: 1rem;
      line-height: 1.6;
      color: #2a3428;
    }

    .contact-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .contact-card {
      background: #fefcf7;
      flex: 1;
      min-width: 230px;
      padding: 1.6rem;
      border-radius: 1.5rem;
      border: 1px solid #e8e2d2;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.02);
    }

    .contact-card h4 {
      font-size: 1.35rem;
      margin-bottom: 1rem;
      color: #2f6e41;
    }

    .map-mock {
      background: #eff3e9;
      padding: 1.6rem;
      border-radius: 1.5rem;
      text-align: center;
      color: #2b5736;
      font-weight: 500;
      border: 1px solid #dbd9c9;
    }

    footer {
      background: #1d2e1a;
      color: #e2efda;
      padding: 2rem 0 1.5rem;
      margin-top: 2.5rem;
      border-radius: 1.8rem 1.8rem 0 0;
    }

    .footer-inner {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .copyright {
      font-size: 0.85rem;
      opacity: 0.9;
    }

    .footer-links a {
      color: #cde6c2;
      text-decoration: none;
      margin: 0 0.8rem;
      font-size: 0.9rem;
    }

    .footer-links a:hover {
      color: white;
      text-decoration: underline;
    }

    @media (max-width: 680px) {
      nav {
        flex-direction: column;
        align-items: flex-start;
      }
      .hero {
        flex-direction: column;
        text-align: center;
      }
      .hero-content {
        width: 100%;
      }
      .contact-card-hero {
        align-items: flex-start;
        width: 100%;
      }
      .section-title {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <nav>
      <div class="logo">
        <h1>Sanskriti Gurukulam</h1>
        <div class="tag">🎓 Morar, Gwalior | Vidya & Sanskriti</div>
      </div>
      <div class="nav-links">
        <a href="#" data-page="home">Home</a>
        <a href="#" data-page="privacy">Privacy Policy</a>
        <a href="#" data-page="terms">Terms & Condition</a>
        <a href="#" data-page="contact">Contact</a>
      </div>
    </nav>
  </div>
</header>

<main class="container" id="main-content">
  <div id="page-render"></div>
</main>

<footer>
  <div class="container footer-inner">
    <div class="copyright">
      © 2026 Sanskriti Gurukulam School, Morar Gwalior. All rights reserved.
    </div>
    <div class="footer-links">
      <a href="#" data-page="privacy">Privacy</a>
      <a href="#" data-page="terms">Terms</a>
      <a href="#" data-page="contact">Contact</a>
    </div>
  </div>
</footer>

<script>
  // ========== Provided Details ==========
  const SCHOOL_DATA = {
    name: "Sanskriti Gurukulam School",
    email: "Happyjain@live.in",
    phone: "9131212007",
    city: "Morar, Gwalior",
    fullAddress: "Morar, Gwalior (Madhya Pradesh) - 474006"
  };

  // ========== PAGE BUILDER COMPONENTS ==========
  const HomePage = () => `
    <div class="hero">
      <div class="hero-content">
        <div class="school-badge">🏛️ Sanskriti Gurukulam School | Morar Gwalior</div>
        <h2>Happy Jain</h2>
        <p style="font-size: 1.08rem; margin-top: 0.2rem; color: #2b4a2a;">Educator · Mentor · Shaping minds with traditional values & modern vision</p>
        <div class="contact-card-hero">
          <div class="contact-item"><strong>📧 Email:</strong> <a href="mailto:${SCHOOL_DATA.email}">${SCHOOL_DATA.email}</a></div>
          <div class="contact-item"><strong>📞 Phone:</strong> <a href="tel:${SCHOOL_DATA.phone}">${SCHOOL_DATA.phone}</a></div>
          <div class="contact-item"><strong>📍 Location:</strong> ${SCHOOL_DATA.fullAddress}</div>
          <div class="contact-item"><strong>🏫 School:</strong> ${SCHOOL_DATA.name}</div>
        </div>
      </div>
      <div class="hero-avatar">
        🌿📚
      </div>
    </div>
    <div class="page-section">
      <h3 class="section-title">📖 Welcome to Sanskriti Gurukulam</h3>
      <p><strong>Sanskriti Gurukulam School, Morar Gwalior</strong> stands as a beacon of holistic education. Under the guidance of dedicated educators like <strong>Happy Jain</strong>, the school blends academic excellence with cultural roots. We believe in nurturing young minds through value-based learning, creativity, and discipline.</p>
      <p>Happy Jain brings years of experience and passion to the classroom, fostering an environment where every child feels empowered to explore, question, and grow. The school is committed to building responsible citizens who carry forward the essence of Indian heritage while embracing global perspectives.</p>
    </div>
    <div class="page-section">
      <h3 class="section-title">🌟 Our Educational Philosophy</h3>
      <p>At Sanskriti Gurukulam, we prioritize overall personality development — academics, sports, arts, and life skills. With a student-centric approach, we ensure that each child receives individual attention. Happy Jain actively leads workshops, parent-teacher collaborations, and mentoring sessions that bridge the gap between home and school.</p>
      <p style="margin-top: 0.8rem;">📌 <strong>Core values:</strong> Respect, Responsibility, Curiosity, Compassion.</p>
    </div>
  `;

  const PrivacyPage = () => `
    <div class="page-section">
      <h2 class="section-title">Privacy Policy</h2>
      <div class="policy-content">
        <p><strong>Effective Date:</strong> 1 June 2026</p>
        <p>This Privacy Policy describes the practices of <strong>Sanskriti Gurukulam School, Morar Gwalior</strong> (represented by Happy Jain) regarding the collection, use, and disclosure of information through this website. Your privacy is important to us.</p>
        
        <h3>1. Information Collection</h3>
        <p>We may collect personal information such as your name, email address, phone number, or any message you voluntarily provide when you contact us via email (${SCHOOL_DATA.email}) or phone. We do not use automated tracking cookies for advertising or third-party data mining.</p>
        
        <h3>2. Use of Information</h3>
        <p>Any information submitted will be used solely to respond to inquiries, share updates regarding school events, admissions, or parent communication. We never sell, trade, or rent personal data to outside parties.</p>
        
        <h3>3. Data Security</h3>
        <p>We adopt reasonable security practices to protect your personal information. However, no method of transmission over the internet is 100% secure. Please be mindful while sharing sensitive data.</p>
        
        <h3>4. Children’s Privacy</h3>
        <p>This website is intended for parents, guardians, and educators. Individuals under 18 should obtain parental consent before submitting any personal information.</p>
        
        <h3>5. Contact for Privacy Issues</h3>
        <p>If you have any questions regarding this Privacy Policy, please reach out to <strong>${SCHOOL_DATA.email}</strong> or call <strong>${SCHOOL_DATA.phone}</strong>.</p>
        <p><em>Last updated: June 2026</em></p>
      </div>
    </div>
  `;

  const TermsPage = () => `
    <div class="page-section">
      <h2 class="section-title">Terms & Conditions</h2>
      <div class="terms-content">
        <p>Welcome to the official online presence of <strong>Sanskriti Gurukulam School, Morar Gwalior</strong> (faculty representative: Happy Jain). By accessing this website, you agree to be bound by these Terms & Conditions. Please read them carefully.</p>
        
        <h3>1. Use of Content</h3>
        <p>All content displayed — including text, images, logos, and graphics — is for informational and non-commercial use. You may not reproduce, distribute, modify, or republish any material without prior written permission from Sanskriti Gurukulam School.</p>
        
        <h3>2. Educational Purpose</h3>
        <p>This website serves as a communication and information platform for students, parents, and the community. While we strive for accuracy, we do not guarantee that all information is complete or error-free. The content does not constitute professional or legal advice.</p>
        
        <h3>3. External Links</h3>
        <p>Our site may contain links to third-party websites. These links are provided for convenience only, and we assume no responsibility for the content, privacy policies, or practices of any external sites.</p>
        
        <h3>4. Limitation of Liability</h3>
        <p>To the fullest extent permitted by law, Sanskriti Gurukulam School and Happy Jain shall not be liable for any direct, indirect, incidental, or consequential damages arising from the use or inability to use this website.</p>
        
        <h3>5. Governing Law</h3>
        <p>These Terms shall be governed by and construed in accordance with the laws of India. Any disputes arising shall be subject to the exclusive jurisdiction of the courts in Gwalior, Madhya Pradesh.</p>
        
        <h3>6. Modification of Terms</h3>
        <p>We reserve the right to update these Terms & Conditions at any time without prior notice. Continued use of the site constitutes acceptance of the revised terms.</p>
        
        <p><strong>For any queries:</strong> Contact ${SCHOOL_DATA.email} or ${SCHOOL_DATA.phone}</p>
      </div>
    </div>
  `;

  const ContactPage = () => `
    <div class="page-section">
      <h2 class="section-title">📬 Get in Touch</h2>
      <div class="contact-grid">
        <div class="contact-card">
          <h4>✉️ Email Directly</h4>
          <p>Send your queries about admissions, academics, collaborations, or feedback.</p>
          <p><strong><a href="mailto:${SCHOOL_DATA.email}" style="color:#2a8447;">${SCHOOL_DATA.email}</a></strong></p>
          <p style="font-size:0.85rem; margin-top:8px;">Happy Jain responds within 24-48 hours.</p>
        </div>
        <div class="contact-card">
          <h4>📞 Phone / WhatsApp</h4>
          <p>Prefer a conversation? Call between 9:00 AM – 4:30 PM (weekdays).</p>
          <p><strong><a href="tel:${SCHOOL_DATA.phone}">${SCHOOL_DATA.phone}</a></strong></p>
        </div>
        <div class="contact-card">
          <h4>🏫 School Campus</h4>
          <p><strong>Sanskriti Gurukulam School</strong><br>${SCHOOL_DATA.fullAddress}</p>
          <p>📍 Landmark: Morar Cantt Area, Gwalior</p>
        </div>
      </div>
      <div class="map-mock">
        🏛️ <strong>Sanskriti Gurukulam School, Morar Gwalior</strong><br>
        Near Morar Bus Stand, Gwalior (M.P.) — 474006<br>
        🧭 A nurturing environment rooted in values & excellence.
      </div>
      <div style="margin-top: 1.8rem; background:#F8F6EF; padding: 1.2rem 1.5rem; border-radius: 1.2rem;">
        <p style="font-weight: 500;">💬 We look forward to hearing from parents, students, and educators. Kindly mention your name & purpose for a swift response.</p>
      </div>
    </div>
  `;

  // ---------- ROUTER ----------
  let currentPage = "home";   // home, privacy, terms, contact

  function renderPage() {
    const container = document.getElementById("page-render");
    if (!container) return;
    switch (currentPage) {
      case "home":
        container.innerHTML = HomePage();
        break;
      case "privacy":
        container.innerHTML = PrivacyPage();
        break;
      case "terms":
        container.innerHTML = TermsPage();
        break;
      case "contact":
        container.innerHTML = ContactPage();
        break;
      default:
        container.innerHTML = HomePage();
    }
    // update hash without reload loops
    if (currentPage === "home") {
      if (window.location.hash !== "") window.location.hash = "";
    } else {
      if (window.location.hash !== `#${currentPage}`) window.location.hash = currentPage;
    }
  }

  function setActivePage(pageId) {
    currentPage = pageId;
    renderPage();
    attachNavEvents();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function navClickHandler(e) {
    e.preventDefault();
    const page = e.currentTarget.getAttribute("data-page");
    if (page && ["home", "privacy", "terms", "contact"].includes(page)) {
      setActivePage(page);
    } else {
      setActivePage("home");
    }
  }

  function attachNavEvents() {
    const allNavLinks = document.querySelectorAll("[data-page]");
    allNavLinks.forEach(link => {
      link.removeEventListener("click", navClickHandler);
      link.addEventListener("click", navClickHandler);
    });
  }

  function handleHashChange() {
    let hash = window.location.hash.replace("#", "");
    if (hash === "privacy" || hash === "terms" || hash === "contact") {
      currentPage = hash;
    } else if (hash === "" || hash === "home") {
      currentPage = "home";
    } else {
      currentPage = "home";
    }
    renderPage();
    attachNavEvents();
  }

  // initial load & hash listener
  window.addEventListener("DOMContentLoaded", () => {
    const initialHash = window.location.hash.substring(1);
    if (initialHash === "privacy" || initialHash === "terms" || initialHash === "contact") {
      currentPage = initialHash;
    } else {
      currentPage = "home";
    }
    renderPage();
    attachNavEvents();
    window.addEventListener("hashchange", handleHashChange);
  });
</script>
</body>
</html>
